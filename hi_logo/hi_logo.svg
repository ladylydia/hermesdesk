<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
      .bg { fill: #3B5BC7; }
      .border { fill: none; stroke: #F59E0B; stroke-width: 3; }
      .text { 
        fill: #FFFFFF; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 700;
        font-size: 480px;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect class="bg" x="1.5" y="1.5" width="1021" height="1021" rx="240" ry="240"/>
  <!-- 琥珀色边框 -->
  <rect class="border" x="1.5" y="1.5" width="1021" height="1021" rx="240" ry="240"/>
  <!-- 居中文字 -->
  <text class="text" x="512" y="512">Hi</text>
</svg>